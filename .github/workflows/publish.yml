name: Publish

on:
  push:
    tags:
      - "v*.*.*"      # semver tags  →  v1.2.3
  workflow_dispatch:
    inputs:
      extra_tag:
        description: "Extra image tag (e.g. 'latest')"
        required: false
        default: ""

env:
  NS3_VERSION: "3.46.1"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ------------------------------------------------------------------
  # 1. Gate: tests must pass before we publish anything
  # ------------------------------------------------------------------
  test:
    name: Run tests before publish
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read
      packages: write
      checks: write

  # ------------------------------------------------------------------
  # 2. Build & push the production image to GHCR
  # ------------------------------------------------------------------
  publish:
    name: Build & Push to GHCR
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write   # for OIDC / Sigstore signing

    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
      image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive all the tags we want attached to this image:
      #   v1.2.3  →  v1.2.3 + v1.2 + v1 + latest
      #   manual  →  user-supplied tag + sha
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=${{ github.event.inputs.extra_tag }},enable=${{ github.event.inputs.extra_tag != '' }}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=GhostDAG Simulator
            org.opencontainers.image.description=ns-3 / MPI network simulator for the GHOSTDAG consensus protocol
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=GPL-2.0

      - name: Build & push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          # Build for both amd64 and arm64 so the image runs on Apple Silicon
          # runners / ARM cloud instances without emulation.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: NS3_VERSION=${{ env.NS3_VERSION }}
          # Per-platform cache keys — a single shared key causes the slower
          # arm64 (QEMU-emulated) build to overwrite the amd64 cache on every
          # run, leaving one platform always cold.
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/cache:builder-amd64
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/cache:builder-arm64
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/cache:builder-amd64,mode=max
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/cache:builder-arm64,mode=max
          provenance: true
          sbom: true

      # ------------------------------------------------------------------
      # 3. Sign the image with Sigstore / cosign (keyless OIDC)
      # ------------------------------------------------------------------
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}"

  # ------------------------------------------------------------------
  # 4. Post the published digest as a summary
  # ------------------------------------------------------------------
  summary:
    name: Publish summary
    needs: publish
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Write job summary
        run: |
          echo "## 🐳 Published image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | \`${{ env.REGISTRY }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ needs.publish.outputs.image-digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Ref | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull command" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ needs.publish.outputs.image-ref }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
