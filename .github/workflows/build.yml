name: Build

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  NS3_VERSION: "3.46.1"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # needed to push the build cache to GHCR

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-metadata: ${{ steps.meta.outputs.json }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # branch builds get a sha label, not a published tag
            type=sha,prefix=sha-,format=short

      # Build only (no push) to verify the image compiles correctly.
      # The ns-3 builder stage is cached in GHCR so subsequent runs are fast.
      - name: Build (no push)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: NS3_VERSION=${{ env.NS3_VERSION }}
          # Reuse the heavy ns-3 compile layer from the registry cache
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/cache:builder
          # Write a warm cache back so publish jobs benefit from it
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/cache:builder,mode=max
          provenance: false

      - name: Image size report
        run: |
          docker image inspect \
            $(docker images -q | head -1) \
            --format '{{.RepoTags}} — {{.Size}} bytes' || true
