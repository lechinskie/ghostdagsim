name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

env:
  NS3_VERSION: "3.46.1"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Unit Tests (GhostDAG + Mempool)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR (for cache pulls)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.test
          load: true
          tags: ghostdagsim-test:ci
          build-args: NS3_VERSION=${{ env.NS3_VERSION }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/cache:test-builder
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/cache:test-builder,mode=max


      - name: Run ghostdagtest
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/results:/results \
            ghostdagsim-test:ci \
            /usr/local/bin/ghostdagtest \
            --gtest_output=xml:/results/ghostdagtest-results.xml


      - name: Run ghostdagtest
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/results:/results \
            ghostdagsim-test:ci \
            /usr/local/bin/mempooltest \
            --gtest_output=xml:/results/mempooltest-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: "results/*-results.xml"
          retention-days: 14

      - name: Publish test summary
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: "results/*-results.xml"
          check_name: "GhostDAG Unit Tests"
