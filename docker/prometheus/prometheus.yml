global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    cluster: 'ghostdag-simulator'
    environment: 'development'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  - job_name: 'ghostdag'
    static_configs:
      - targets: ['host.docker.internal:9091']
        labels:
          service: 'ghostdag-simulator'
          network: 'p2p'
    metrics_path: '/metrics'
    scrape_interval: 2s
    scrape_timeout: 1s

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'
